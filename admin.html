<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">BlogNav</a>
            <nav class="nav-links">
                <a href="index.html">首页</a>
                <a href="sites.html">网址导航</a>
                <a href="admin.html" class="active">管理后台</a>
            </nav>
        </div>
    </header>

    <main class="container admin-page">
        <!-- 标签页导航 -->
        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="posts">文章管理</button>
            <button class="tab-btn" data-tab="sites">网址管理</button>
            <button class="tab-btn" data-tab="categories">分类管理</button>
            <button class="tab-btn" data-tab="data">数据导入导出</button>
        </div>

        <!-- 文章管理 -->
        <div class="tab-content active" id="postsTab">
            <div class="admin-actions">
                <button class="btn-primary" id="newPostBtn">+ 新建文章</button>
            </div>
            
            <!-- 文章编辑器 -->
            <div class="editor-panel" id="postEditor" style="display:none;">
                <h3 id="editorTitle">新建文章</h3>
                <div class="form-group">
                    <label>文章标题</label>
                    <input type="text" id="postTitleInput" placeholder="请输入标题">
                </div>
                <div class="form-group">
                    <label>文章摘要</label>
                    <textarea id="postSummaryInput" rows="2" placeholder="简短描述，显示在列表页"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>分类</label>
                        <select id="postCategorySelect"></select>
                    </div>
                    <div class="form-group">
                        <label>置顶</label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="postTopCheck"> 设为置顶
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label>标签（用英文逗号分隔）</label>
                    <input type="text" id="postTagsInput" placeholder="例如：技术,前端,JavaScript">
                </div>
                <div class="form-group">
                    <label>
                        正文内容（支持 Markdown）
                        <span class="word-count">字数：<span id="wordCount">0</span></span>
                    </label>
                    <div class="editor-toolbar">
                        <button type="button" class="tool-btn" onclick="insertImage()">插入图片</button>
                        <button type="button" class="tool-btn" onclick="insertLink()">插入链接</button>
                        <button type="button" class="tool-btn" onclick="togglePreview()">预览</button>
                    </div>
                    <div class="editor-container">
                        <textarea id="postContentInput" placeholder="支持 Markdown 语法..."></textarea>
                        <div class="markdown-preview" id="markdownPreview"></div>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn-secondary" onclick="cancelEdit()">取消</button>
                    <button class="btn-primary" onclick="savePost()">保存发布</button>
                </div>
            </div>

            <!-- 文章列表 -->
            <div class="admin-list" id="postsListAdmin"></div>
        </div>

        <!-- 网址管理 -->
        <div class="tab-content" id="sitesTab">
            <div class="admin-actions">
                <button class="btn-primary" id="newSiteBtn">+ 添加网址</button>
            </div>

            <!-- 网址编辑器 -->
            <div class="editor-panel" id="siteEditor" style="display:none;">
                <h3 id="siteEditorTitle">添加网址</h3>
                <div class="form-group">
                    <label>网站名称</label>
                    <input type="text" id="siteNameInput" placeholder="网站名称">
                </div>
                <div class="form-group">
                    <label>网站简介</label>
                    <textarea id="siteDescInput" rows="2" placeholder="一句话介绍"></textarea>
                </div>
                <div class="form-group">
                    <label>网站图标地址（URL）</label>
                    <input type="text" id="siteIconInput" placeholder="https://.../favicon.ico">
                </div>
                <div class="form-group">
                    <label>主链接</label>
                    <input type="text" id="siteUrlInput" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label>备用链接</label>
                    <div id="backupLinksContainer"></div>
                    <button type="button" class="btn-small" onclick="addBackupLink()">+ 添加备用链接</button>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>分类</label>
                        <select id="siteCategorySelect"></select>
                    </div>
                </div>
                <div class="form-group">
                    <label>标签（英文逗号分隔）</label>
                    <input type="text" id="siteTagsInput" placeholder="工具,开发,设计">
                </div>
                <div class="form-group">
                    <label>搜索关键词（英文逗号分隔，用于模糊搜索）</label>
                    <input type="text" id="siteKeywordsInput" placeholder="更多搜索提示词">
                </div>
                <div class="form-actions">
                    <button class="btn-secondary" onclick="cancelSiteEdit()">取消</button>
                    <button class="btn-primary" onclick="saveSite()">保存</button>
                </div>
            </div>

            <!-- 网址列表 -->
            <div class="admin-list" id="sitesListAdmin"></div>
        </div>

        <!-- 分类管理 -->
        <div class="tab-content" id="categoriesTab">
            <div class="category-section">
                <h3>文章分类</h3>
                <div class="category-input-row">
                    <input type="text" id="newPostCategory" placeholder="新分类名称">
                    <button class="btn-primary" onclick="addPostCategory()">添加</button>
                </div>
                <div class="category-list" id="postCategoryList"></div>
            </div>
            <div class="category-section">
                <h3>网址分类</h3>
                <div class="category-input-row">
                    <input type="text" id="newSiteCategory" placeholder="新分类名称">
                    <button class="btn-primary" onclick="addSiteCategory()">添加</button>
                </div>
                <div class="category-list" id="siteCategoryList"></div>
            </div>
        </div>

        <!-- 数据管理 -->
        <div class="tab-content" id="dataTab">
            <div class="data-section">
                <h3>导出数据</h3>
                <p>将所有文章、网址、分类数据导出为 JSON 文件，可备份或迁移到其他设备。</p>
                <button class="btn-primary" onclick="exportData()">导出全部数据</button>
            </div>
            <div class="data-section">
                <h3>导入数据</h3>
                <p>选择 JSON 数据文件导入（将覆盖当前所有数据）</p>
                <input type="file" id="importFile" accept=".json">
                <button class="btn-secondary" onclick="importData()">导入数据</button>
            </div>
            <div class="data-section danger">
                <h3>危险操作</h3>
                <p>清空所有数据，不可恢复。</p>
                <button class="btn-danger" onclick="clearAllData()">清空所有数据</button>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© 2026 BlogNav · 部署于 GitHub Pages</p>
        </div>
    </footer>

    <script src="js/marked.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
