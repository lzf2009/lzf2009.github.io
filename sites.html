<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网址导航</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">BlogNav</a>
            <nav class="nav-links">
                <a href="index.html">首页</a>
                <a href="sites.html" class="active">网址导航</a>
                <a href="admin.html">管理后台</a>
            </nav>
        </div>
    </header>

    <main class="container sites-page">
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="siteSearch" placeholder="搜索网站名称、描述、关键词...">
            </div>
        </div>

        <div class="sites-layout">
            <!-- 左侧分类快速导航 -->
            <aside class="site-categories" id="siteCategories"></aside>

            <!-- 右侧网站卡片列表 -->
            <section class="sites-content" id="sitesContent"></section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© 2026 BlogNav · 部署于 GitHub Pages</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>renderSitesPage();</script>
</body>
</html>
