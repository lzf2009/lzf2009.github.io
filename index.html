<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 | 博客与导航</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">BlogNav</a>
            <nav class="nav-links">
                <a href="index.html" class="active">首页</a>
                <a href="sites.html">网址导航</a>
                <a href="admin.html">管理后台</a>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <!-- 全局搜索框 -->
        <section class="search-section">
            <div class="search-box">
                <input type="text" id="globalSearch" placeholder="搜索文章、网址、标签、分类...">
                <div class="search-results" id="searchResults"></div>
            </div>
        </section>

        <div class="home-layout">
            <!-- 左侧：文章列表 -->
            <section class="posts-section">
                <div class="section-header">
                    <h2>最新文章</h2>
                    <a href="posts.html" class="view-all">查看全部 →</a>
                </div>
                <div class="posts-list" id="postsList"></div>
            </section>

            <!-- 右侧：网址导航 -->
            <aside class="sites-section">
                <div class="section-header">
                    <h2>常用网址</h2>
                    <a href="sites.html" class="view-all">全部导航 →</a>
                </div>
                <div class="sites-grid" id="sitesWidget"></div>
            </aside>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© 2026 BlogNav · 部署于 GitHub Pages</p>
        </div>
    </footer>

    <script src="js/marked.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
