<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网站详情</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container fade-wrap">
  <div class="header-bar">
    <a href="index.html" class="site-title">网站详情</a>
    <div>
      <a href="post2.html" class="nav-link">全部导航</a>
      <a href="index.html" class="nav-link">首页</a>
    </div>
  </div>
  <div id="site-detail-box" class="card"></div>
</div>
<script src="js/main.js"></script>
<script>
window.onload = ()=>{
  const id = getUrlParam("id");
  const sites = getStorage(STORAGE_SITES);
  const s = sites.find(x=>x.id===id);
  const box = document.getElementById("site-detail-box");
  if(!s) return box.innerHTML = "<h3>该网站不存在</h3><a href='post2.html'>返回导航页</a>";
  let backupHtml = "";
  if(s.backup && s.backup.length>0) {
    backupHtml = `<div style="margin-top:12px;"><h4>备用链接</h4>${s.backup.map(u=>`<a href="${u}" target="_blank" class="more-btn">${u}</a>`).join("<br>")}</div>`;
  }
  box.innerHTML = `
    <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;">
      <img class="site-icon" style="width:80px;height:80px;" src="${s.icon||''}">
      <div>
        <h2 style="font-size:28px;margin-bottom:8px;">${s.name}</h2>
        <p style="color:var(--text-sub);font-size:16px;line-height:1.7;">${s.desc}</p>
      </div>
    </div>
    <div style="margin-bottom:16px;">
      <h4>直达链接</h4>
      <a href="${s.link}" target="_blank" class="btn btn-primary" style="display:inline-block;margin-top:8px;">打开网站</a>
      <div style="margin-top:10px;color:#555;">${s.link}</div>
      ${backupHtml}
    </div>
    <div class="tag-wrap">
      <span class="tag">分类：${s.category}</span>
      <span class="tag">搜索关键词：${s.searchKey}</span>
    </div>
    <div style="margin-top:30px;">
      <a href="post2.html" class="btn btn-outline">← 返回全部导航</a>
    </div>
  `;
}
</script>
</body>
</html>
