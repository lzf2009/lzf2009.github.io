<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网址详情 - 智汇博客</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html">
                    <i class="fas fa-brain"></i>
                    <span>智汇博客</span>
                </a>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="links.html">网址导航</a></li>
                    <li><a href="admin.html" class="admin-link"><i class="fas fa-cog"></i> 后台管理</a></li>
                </ul>
            </nav>
            <div class="mobile-menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <!-- 网址详情内容 -->
    <main class="link-detail-main container">
        <div class="link-detail-card">
            <div class="link-detail-header">
                <div class="link-icon-large">
                    <img id="detail-icon" src="" alt="网站图标">
                </div>
                <div class="link-detail-info">
                    <h1 id="detail-name">网站名称</h1>
                    <p id="detail-description" class="link-description">网站描述</p>
                    <div class="link-meta">
                        <span class="link-category"><i class="fas fa-folder"></i> <span id="detail-category">分类</span></span>
                        <span class="link-date"><i class="far fa-calendar-plus"></i> 添加于 <span id="detail-date">日期</span></span>
                    </div>
                </div>
            </div>
            
            <div class="link-detail-body">
                <div class="link-actions">
                    <a id="direct-link" href="#" target="_blank" class="btn btn-primary">
                        <i class="fas fa-external-link-alt"></i> 直达网站
                    </a>
                    <button id="copy-link-btn" class="btn">
                        <i class="far fa-copy"></i> 复制链接
                    </button>
                    <button id="edit-link-btn" class="btn">
                        <i class="fas fa-edit"></i> 编辑网址
                    </button>
                </div>
                
                <div class="link-urls">
                    <h3><i class="fas fa-link"></i> 网站链接</h3>
                    <div class="url-item primary-url">
                        <label>主链接：</label>
                        <div class="url-value">
                            <a id="main-url" href="#" target="_blank"></a>
                            <button class="copy-btn" data-target="main-url">
                                <i class="far fa-copy"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div id="backup-urls-container">
                        <!-- 备用链接动态加载 -->
                    </div>
                </div>
                
                <div class="link-tags-section">
                    <h3><i class="fas fa-tags"></i> 标签</h3>
                    <div id="detail-tags" class="tags-cloud">
                        <!-- 动态加载标签 -->
                    </div>
                </div>
                
                <div class="link-keywords-section">
                    <h3><i class="fas fa-search"></i> 搜索提示词</h3>
                    <div id="detail-keywords" class="keywords-list">
                        <!-- 动态加载搜索关键词 -->
                    </div>
                </div>
                
                <div class="link-related">
                    <h3><i class="fas fa-project-diagram"></i> 相关网址</h3>
                    <div id="related-links" class="related-links-grid">
                        <!-- 动态加载相关网址 -->
                    </div>
                </div>
            </div>
        </div>
        
        <div class="link-detail-sidebar">
            <div class="sidebar-widget">
                <h3><i class="fas fa-info-circle"></i> 网址信息</h3>
                <div class="widget-content">
                    <p><strong>分类：</strong><span id="sidebar-category">未分类</span></p>
                    <p><strong>添加日期：</strong><span id="sidebar-date">2026-01-01</span></p>
                    <p><strong>访问次数：</strong><span id="visit-count">0</span> 次</p>
                </div>
            </div>
            
            <div class="sidebar-widget">
                <h3><i class="fas fa-chart-line"></i> 访问统计</h3>
                <div class="widget-content">
                    <canvas id="visit-chart" width="100%" height="200"></canvas>
                </div>
            </div>
            
            <div class="sidebar-widget">
                <h3><i class="fas fa-lightbulb"></i> 使用提示</h3>
                <div class="widget-content">
                    <ul class="tips-list">
                        <li>点击"直达网站"按钮访问目标网站</li>
                        <li>使用"复制链接"按钮复制网址到剪贴板</li>
                        <li>点击标签可以搜索同类网址</li>
                        <li>备用链接在主链接不可用时使用</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <i class="fas fa-brain"></i>
                    <span>智汇博客</span>
                </div>
                <div class="footer-links">
                    <a href="index.html">首页</a>
                    <a href="links.html">网址导航</a>
                    <a href="admin.html">后台管理</a>
                </div>
                <div class="footer-copyright">
                    <p>© 2026 智汇博客 | 基于 GitHub Pages 构建</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- 复制成功提示 -->
    <div id="copy-toast" class="toast">链接已复制到剪贴板！</div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        // 网址详情页专用脚本
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const linkId = urlParams.get('id');
            
            if (linkId) {
                loadLinkDetail(linkId);
            } else {
                document.querySelector('.link-detail-card').innerHTML = '<div class="error">未找到网址ID，请检查链接是否正确。</div>';
            }
            
            // 复制链接按钮
            document.getElementById('copy-link-btn').addEventListener('click', function() {
                const linkUrl = document.getElementById('main-url').href;
                copyToClipboard(linkUrl);
            });
            
            // 编辑网址按钮
            document.getElementById('edit-link-btn').addEventListener('click', function() {
                window.location.href = `admin.html?editLink=${linkId}`;
            });
        });
        
        function loadLinkDetail(linkId) {
            const link = BlogData.getLinkById(linkId);
            
            if (!link) {
                document.querySelector('.link-detail-card').innerHTML = '<div class="error">未找到该网址，可能已被删除。</div>';
                return;
            }
            
            // 增加访问计数
            BlogData.incrementVisitCount(linkId);
            
            // 设置页面标题
            document.title = `${link.name} - 智汇博客`;
            
            // 填充网址信息
            document.getElementById('detail-icon').src = link.icon || 'images/default-icon.png';
            document.getElementById('detail-name').textContent = link.name;
            document.getElementById('detail-description').textContent = link.description;
            document.getElementById('detail-category').textContent = link.category;
            document.getElementById('detail-date').textContent = formatDate(link.dateAdded);
            
            // 主链接
            const mainUrlElement = document.getElementById('main-url');
            mainUrlElement.href = link.url;
            mainUrlElement.textContent = link.url;
            document.getElementById('direct-link').href = link.url;
            
            // 备用链接
            const backupContainer = document.getElementById('backup-urls-container');
            if (link.backupUrls && link.backupUrls.length > 0) {
                let backupHtml = '<h4><i class="fas fa-clone"></i> 备用链接：</h4>';
                link.backupUrls.forEach((backupUrl, index) => {
                    backupHtml += `
                    <div class="url-item backup-url">
                        <label>备用链接 ${index + 1}：</label>
                        <div class="url-value">
                            <a href="${backupUrl}" target="_blank">${backupUrl}</a>
                            <button class="copy-btn" data-target="${backupUrl}">
                                <i class="far fa-copy"></i>
                            </button>
                        </div>
                    </div>`;
                });
                backupContainer.innerHTML = backupHtml;
            } else {
                backupContainer.innerHTML = '';
            }
            
            // 标签
            const tagsContainer = document.getElementById('detail-tags');
            let tagsHtml = '';
            if (link.tags && link.tags.length > 0) {
                link.tags.forEach(tag => {
                    tagsHtml += `<a href="index.html?search=${encodeURIComponent(tag)}" class="tag">${tag}</a>`;
                });
            } else {
                tagsHtml = '<span class="no-tags">暂无标签</span>';
            }
            tagsContainer.innerHTML = tagsHtml;
            
            // 搜索关键词
            const keywordsContainer = document.getElementById('detail-keywords');
            let keywordsHtml = '';
            if (link.searchKeywords && link.searchKeywords.length > 0) {
                link.searchKeywords.forEach(keyword => {
                    keywordsHtml += `<span class="keyword">${keyword}</span>`;
                });
            } else {
                keywordsHtml = '<span class="no-keywords">暂无搜索关键词</span>';
            }
            keywordsContainer.innerHTML = keywordsHtml;
            
            // 侧边栏信息
            document.getElementById('sidebar-category').textContent = link.category;
            document.getElementById('sidebar-date').textContent = formatDate(link.dateAdded);
            document.getElementById('visit-count').textContent = link.visitCount || 0;
            
            // 加载相关网址
            loadRelatedLinks(link);
            
            // 加载访问图表
            loadVisitChart(linkId);
            
            // 复制按钮事件
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const target = this.getAttribute('data-target');
                    let urlToCopy = target;
                    
                    // 如果是元素ID，获取其href属性
                    if (target.startsWith('#')) {
                        urlToCopy = document.querySelector(target).href;
                    }
                    
                    copyToClipboard(urlToCopy);
                });
            });
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }
        
        function loadRelatedLinks(currentLink) {
            const allLinks = BlogData.getLinks();
            const relatedLinks = allLinks.filter(link => {
                // 排除当前链接
                if (link.id === currentLink.id) return false;
                
                // 相同分类或相关标签
                return link.category === currentLink.category || 
                       link.tags.some(tag => currentLink.tags.includes(tag));
            }).slice(0, 6); // 最多显示6个
            
            const container = document.getElementById('related-links');
            let html = '';
            
            if (relatedLinks.length > 0) {
                relatedLinks.forEach(link => {
                    html += `
                    <a href="link-detail.html?id=${link.id}" class="related-link-card">
                        <img src="${link.icon || 'images/default-icon.png'}" alt="${link.name}">
                        <div class="related-link-info">
                            <h4>${link.name}</h4>
                            <p>${link.description.substring(0, 40)}...</p>
                        </div>
                    </a>`;
                });
            } else {
                html = '<p class="no-related">暂无相关网址</p>';
            }
            
            container.innerHTML = html;
        }
        
        function loadVisitChart(linkId) {
            const ctx = document.getElementById('visit-chart').getContext('2d');
            
            // 模拟过去7天的访问数据
            const labels = [];
            const data = [];
            const today = new Date();
            
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                labels.push(date.toLocaleDateString('zh-CN', {month: 'short', day: 'numeric'}));
                
                // 随机生成访问数据（实际应用中应从存储中获取）
                data.push(Math.floor(Math.random() * 20));
            }
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '每日访问次数',
                        data: data,
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 5
                            }
                        }
                    }
                }
            });
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('copy-toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }).catch(err => {
                console.error('复制失败:', err);
                alert('复制失败，请手动复制链接');
            });
        }
    </script>
</body>
</html>
